services:
  app:
    build: .
    image: core-template
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Live flight search via SerpApi (Google Flights). auth.json is not copied
      # into the image, so provide the key here. Put SERPAPI_API_KEY in your
      # shell env or a .env file next to this compose file.
      - SERPAPI_API_KEY=${SERPAPI_API_KEY:-}
      # Optional quota guards (see docs.txt).
      - SERPAPI_MAX_RANGE_DAYS=${SERPAPI_MAX_RANGE_DAYS:-3}
      - SERPAPI_MAX_CALLS=${SERPAPI_MAX_CALLS:-12}
    restart: unless-stopped
    # Storage is ephemeral by design. For real persistence, the cleaner path is to make
    # the DB location configurable in core.js (e.g. DB_PATH env) and mount a volume there,
    # rather than mounting over the whole /app directory.
